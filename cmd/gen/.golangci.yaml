version: "2"
run:
  timeout: 10m

linters:
  default: none
  enable:
    - ineffassign
    - staticcheck
#    - typecheck
    - unused
    - bodyclose
    - dogsled
    - dupl
    - funlen
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godox
    - revive
    - gomodguard
    - goprintffuncname
    - gosec
    - lll
    - prealloc
    - rowserrcheck
    - sqlclosecheck
    - unconvert
    - unparam
    - whitespace
    - wsl_v5
    - contextcheck
    - forbidigo
  settings:
    dupl:
      threshold: 150
    funlen:
      lines: 150
      statements: 50
    goconst:
      min-len: 2
      min-occurrences: 10
    gocyclo:
      min-complexity: 15
    govet:
      enable-all: true
    mnd:
      # don't include the "operation" and "assign"
      checks:
        - argument
        - case
        - condition
        - return
      ignored-functions:
        - strconv.*
        - utils.*
    lll:
      line-length: 140
    misspell:
      locale: US
    nolintlint:
      allow-unused: false # report any unused nolint directives
      require-explanation: false # don't require an explanation for nolint directives
      require-specific: false # don't require nolint directives to be specific about which linter is being skipped
    depguard:
      rules:
        main:
          files:
            - $all
          deny:
            - pkg: github.com/golang/mock
              desc: "In public archive. Use 'github.com/gojuno/minimock' instead."
            - pkg: "github.com/samber/lo"
              desc: "This package must not be used, because of increasing cognitive complexity."
    errcheck:
      exclude-functions:
        - fmt:.*[rR]ead|[wW]rite|[cC]lose
        - io:Copy
        - (io.Writer).Write
        - (net/http.ResponseWriter).Write
    nonamedreturns:
      report-error-in-defer: false
    sloglint:
      no-mixed-args: true
      # Enforce using key-value pairs only (overrides no-mixed-args, incompatible with attr-only).
      kv-only: false
      # Enforce using attributes only (overrides no-mixed-args, incompatible with kv-only).
      attr-only: false
      # Enforce not using global loggers.
      no-global: ""
      # Enforce using methods that accept a context.
      context: ""
      # Enforce using static values for log messages.
      static-msg: false
      # Enforce using constants instead of raw keys.
      no-raw-keys: false
      # Enforce a single key naming convention.
      key-naming-case: "snake"
      # Enforce not using specific keys.
      forbidden-keys:
        - level
        - msg
        - logger
        - source
        - stacktrace
        - time
      # Enforce putting arguments on separate lines.
      args-on-sep-lines: false
    staticcheck:
      checks:
        - all
        - '-ST1003' # waiting for package name will be fixed (underscores)
        - '-QF1008' # not need to fix; we understand how to call nested structs
    revive:
      rules:
        - name: var-naming # waiting for package name will be fixed (incorrect naming)
          severity: warning
          disabled: false
          exclude: [""]
          arguments:
            - ["ID"] # AllowList
            - ["VM"] # DenyList
            - - skip-initialism-name-checks: false
                upper-case-const: false
                skip-package-name-checks: true
                skip-package-name-collision-with-go-std: false
                extra-bad-package-names: []
formatters:
  enable:
    - gci
    - gofmt
  settings:
    gci:
      sections:
        - standard
        - default
        - localmodule
